apiVersion: apps/v1
kind: Deployment
metadata:
  name: mywebdeployment
  labels:
    app: myweb
spec:
  replicas: 6
  selector:
    matchLabels:
      app: myweb
  template:
    metadata:
      labels:
        app: myweb
    spec:
      containers:
      - name: myweb
        image: bhagyashreeameyawagh/batch040057weekend-2:latest   # ✅ CHANGED
        imagePullPolicy: Always                     # ✅ ADDED
        ports:
        - containerPort: 8080
